version: '3.9'

services:
  backend:
    build: ./backend
    container_name: backend_container
    ports:
      - "8000:8000"
    volumes: 
      - ./backend:/app
  
  frontend:
    build: ./frontend
    container_name: frontend_container
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env
    
